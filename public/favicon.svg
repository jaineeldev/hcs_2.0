<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" width="32" height="32">
  <defs>
    <radialGradient id="bg" cx="50%" cy="40%" r="65%">
      <stop offset="0%" stop-color="#FAF0D7"/>
      <stop offset="100%" stop-color="#EDD9A3"/>
    </radialGradient>
    <radialGradient id="vignette" cx="50%" cy="50%" r="70%">
      <stop offset="60%" stop-color="#8B1A2A" stop-opacity="0"/>
      <stop offset="100%" stop-color="#8B1A2A" stop-opacity="0.18"/>
    </radialGradient>
  </defs>

  <!-- Dark crimson outer frame -->
  <rect width="32" height="32" fill="#7A1525" rx="5"/>

  <!-- Parchment background -->
  <rect x="2" y="2" width="28" height="28" fill="url(#bg)" rx="3.5"/>

  <!-- Vignette -->
  <rect x="2" y="2" width="28" height="28" fill="url(#vignette)" rx="3.5"/>

  <!-- Double border -->
  <rect x="2.5" y="2.5" width="27" height="27" fill="none" stroke="#7A1525" stroke-width="1.5" rx="3"/>
  <rect x="4.5" y="4.5" width="23" height="23" fill="none" stroke="#7A1525" stroke-width="0.6" rx="2"/>

  <!-- Top rule -->
  <line x1="5" y1="8.8" x2="27" y2="8.8" stroke="#7A1525" stroke-width="0.7"/>

  <!-- Diamond ornament top centre -->
  <g transform="translate(16,6.6) rotate(45)">
    <rect x="-2.4" y="-2.4" width="4.8" height="4.8" fill="#FAF0D7" stroke="#7A1525" stroke-width="1"/>
    <rect x="-1.2" y="-1.2" width="2.4" height="2.4" fill="#7A1525"/>
  </g>

  <!-- H - left stem -->
  <rect x="6.5" y="11" width="3" height="12.5" fill="#7A1525" rx="0.3"/>
  <!-- H - right stem -->
  <rect x="13" y="11" width="3" height="12.5" fill="#7A1525" rx="0.3"/>
  <!-- H - crossbar -->
  <rect x="6.5" y="16.5" width="9.5" height="2.5" fill="#7A1525"/>

  <!-- C arc -->
  <path d="M 26.5,14.2 A 5.2,5.2 0 1 0 26.5,21" fill="none" stroke="#7A1525" stroke-width="3.2" stroke-linecap="round"/>

  <!-- Bottom rule -->
  <line x1="5" y1="25.5" x2="27" y2="25.5" stroke="#7A1525" stroke-width="0.7"/>

  <!-- Corner dots -->
  <circle cx="6.2" cy="6.2" r="0.9" fill="#7A1525" opacity="0.45"/>
  <circle cx="25.8" cy="6.2" r="0.9" fill="#7A1525" opacity="0.45"/>
  <circle cx="6.2" cy="25.8" r="0.9" fill="#7A1525" opacity="0.45"/>
  <circle cx="25.8" cy="25.8" r="0.9" fill="#7A1525" opacity="0.45"/>
</svg>
